name: Build Next.js Webapp Docker Image

on:
  push:
    branches:
      - master
      - dev

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        run: |
          REPO_NAME=${{ github.repository }} 
          echo "REPO_NAME_LC=${REPO_NAME,,}" >>${GITHUB_ENV}

      - name: Build Docker image
        run: |
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA:0:7}
          
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            docker build -t ghcr.io/$REPO_NAME_LC:latest -t ghcr.io/$REPO_NAME_LC:master-$SHORT_SHA .
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker build -t ghcr.io/$REPO_NAME_LC:dev -t ghcr.io/$REPO_NAME_LC:dev-$SHORT_SHA .
          fi

      - name: Push Docker image to GitHub Container Registry
        run: |
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA:0:7}
          
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            docker push ghcr.io/$REPO_NAME_LC:latest
            docker push ghcr.io/$REPO_NAME_LC:master-$SHORT_SHA
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            docker push ghcr.io/$REPO_NAME_LC:dev
            docker push ghcr.io/$REPO_NAME_LC:dev-$SHORT_SHA
          fi