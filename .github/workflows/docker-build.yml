name: Build Next.js Webapp Docker Image

on:
  push:
    branches:
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name
        run: |
          REPO_NAME="${{ github.repository }}"
          echo "REPO_NAME_LC=${REPO_NAME,,}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          WEBAPP_VERSION="$(node -p "require('./package.json').version")"
          TAG_ARGS=()
          BUILD_ARGS=(
            --build-arg WEBAPP_VERSION=$WEBAPP_VERSION
            --build-arg WEBAPP_COMMIT_SHA=$GITHUB_SHA
            --build-arg WEBAPP_BUILD_DATE=$BUILD_DATE
          )
          
          if [ "${{ github.ref_name }}" = "master" ]; then
            BUILD_ARGS+=(--build-arg WEBAPP_IMAGE_TAG=latest)
            TAG_ARGS=(-t ghcr.io/$REPO_NAME_LC:latest -t ghcr.io/$REPO_NAME_LC:master-$SHORT_SHA)
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            BUILD_ARGS+=(--build-arg WEBAPP_IMAGE_TAG=dev)
            TAG_ARGS=(-t ghcr.io/$REPO_NAME_LC:dev -t ghcr.io/$REPO_NAME_LC:dev-$SHORT_SHA)
          else
            echo "Unsupported branch for docker publish: ${{ github.ref_name }}" >&2
            exit 1
          fi

          docker buildx build \
            --platform linux/amd64 \
            --progress=plain \
            --provenance=mode=max \
            --sbom=true \
            --push \
            "${BUILD_ARGS[@]}" \
            "${TAG_ARGS[@]}" \
            .